name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, for example 0.1.0"
        required: true
        type: string
      publish:
        description: "Publish packages to NuGet.org"
        required: true
        default: false
        type: boolean
      baseline_version:
        description: "Optional package validation baseline version"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Pack And Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){2}(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$version' is not a valid SemVer package version."
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore SplunkSdk.slnx

      - name: Verify formatting
        run: dotnet format SplunkSdk.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build SplunkSdk.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.value }} -p:PackageVersion=${{ steps.version.outputs.value }}

      - name: Unit tests
        run: dotnet test tests/SplunkSdk.Tests/SplunkSdk.Tests.csproj --configuration Release --no-build

      - name: Integration tests skip check
        run: dotnet test tests/SplunkSdk.IntegrationTests/SplunkSdk.IntegrationTests.csproj --configuration Release --no-build

      - name: Pack
        shell: bash
        run: |
          mkdir -p artifacts/packages

          baseline_args=()
          if [[ -n "${{ inputs.baseline_version }}" ]]; then
            baseline_args+=("-p:PackageValidationBaselineVersion=${{ inputs.baseline_version }}")
          fi

          dotnet pack src/SplunkSdk/SplunkSdk.csproj \
            --configuration Release \
            --no-build \
            --output artifacts/packages \
            -p:Version=${{ steps.version.outputs.value }} \
            -p:PackageVersion=${{ steps.version.outputs.value }} \
            "${baseline_args[@]}"

          dotnet pack src/SplunkSdk.DependencyInjection/SplunkSdk.DependencyInjection.csproj \
            --configuration Release \
            --no-build \
            --output artifacts/packages \
            -p:Version=${{ steps.version.outputs.value }} \
            -p:PackageVersion=${{ steps.version.outputs.value }} \
            "${baseline_args[@]}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: splunksdk-packages-${{ steps.version.outputs.value }}
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::NUGET_API_KEY secret is required to publish packages."
            exit 1
          fi

          dotnet nuget push artifacts/packages/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
